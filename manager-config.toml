[etcd]
namespace = "local"
addr = { host = "backendai-etcd", port = 2379 }
user = ""
password = ""

[db]
type = "postgresql"
addr = { host = "backendai-db", port = 5432 }
name = "backend"
user = "postgres"
password = "develove"
pool-recycle = 50
pool-pre-ping = false

[manager]
num-proc = 1
service-addr = { host = "0.0.0.0", port = 8081 }
internal-addr = { host = "0.0.0.0", port = 18080 }
ssl-enabled = false
heartbeat-timeout = 40.0
pid-file = "./manager.pid"
disabled-plugins = []
hide-agents = true
agent-selection-resource-priority = ["cuda", "rocm", "tpu", "cpu", "mem"]

[docker-registry]
ssl-verify = false

[pyroscope]
enabled = false

[logging]
level = "INFO"
drivers = ["console"]

[logging.pkg-ns]
"" = "WARNING"
"aiotools" = "INFO"
"aiohttp" = "INFO"
"ai.backend" = "INFO"
"alembic" = "INFO"
"sqlalchemy" = "WARNING"

[logging.console]
colored = true
format = "verbose"

[debug]
enabled = false

[otel]
enabled = false

[artifact-registry]
model-registry = "huggingface-hub"

[reservoir]
storage-name = "minio-storage"
enable-approve-process = false

[reservoir.config]
type = "object_storage"
bucket-name = "backendai-storage"